title: Golden Data
description: Golden Data ships the AI feature that makes the next step in your app obvious. Production code, evaluated, in two to three weeks.
url: https://browningtons.github.io
baseurl: /golden-data

# SEO / social
author:
  name: Paul Brown
  email: thegoldendata@gmail.com
logo: /assets/golden-data-logo.png
social:
  name: Golden Data LLC
  links:
    - https://www.linkedin.com/in/paulbrowningtons/
twitter:
  card: summary

# Markdown
markdown: kramdown
kramdown:
  syntax_highlighter: rouge

# Plugins (GitHub Pages allowlisted)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Newsletter collections — auto-listed by signal/index.html, crafting/index.html, and their feeds
collections:
  signal:
    output: true
    permalink: /signal/:name.html
  crafting:
    output: true
    permalink: /crafting/:name.html

defaults:
  - scope:
      path: ""
      type: signal
    values:
      layout: issue
      newsletter: Signal
  - scope:
      path: ""
      type: crafting
    values:
      layout: issue
      newsletter: Crafting

# Files Jekyll should NOT copy to the built site
exclude:
  - README.md
  - GD Invoice Example.pdf
  - prompts
