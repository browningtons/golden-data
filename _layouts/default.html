<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>

  <link rel="icon" href="{{ '/assets/favicon.ico' | relative_url }}" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon-16x16.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">

  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
</head>

<body>
  <div class="wrap">
    <header class="nav">
      <a href="{{ '/' | relative_url }}" class="brand" style="text-decoration: none; color: inherit;">
        <img src="{{ '/assets/golden-data-logo.png' | relative_url }}" alt="Golden Data logo" class="logo" width="34" height="34" />
        <span class="brand-name">Golden Data LLC</span>
      </a>

      <nav class="navlinks" aria-label="Primary">
        <a href="{{ '/' | relative_url }}#what">What I do</a>
        <a href="{{ '/' | relative_url }}#offer">Clarity Sprint</a>
        <a href="{{ '/' | relative_url }}#proof">Proof</a>
        <a href="{{ '/signal/' | relative_url }}">Signal</a>
        <a href="{{ '/' | relative_url }}#about">About</a>
        <a href="{{ '/' | relative_url }}#contact">Contact</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="footer">
      <div>
        © <span id="year"></span> Golden Data ·
        <span style="opacity:.75;">Bridging your data with strategy</span>
      </div>
      <div class="navlinks">
        <a href="{{ '/' | relative_url }}#offer">Clarity Sprint</a>
        <a href="{{ '/signal/' | relative_url }}">Signal</a>
        <a href="{{ '/' | relative_url }}#contact">Contact</a>
      </div>
    </footer>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
