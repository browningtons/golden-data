<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>

  <link rel="icon" href="{{ '/assets/favicon.ico' | relative_url }}" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon-16x16.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">

  <script>
    (function() {
      try {
        var saved = localStorage.getItem('gd-theme');
        var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
</head>

<body>
  <div class="wrap">
    <header class="nav">
      <a href="{{ '/' | relative_url }}" class="brand" style="text-decoration: none; color: inherit;">
        <img src="{{ '/assets/golden-data-logo.png' | relative_url }}" alt="Golden Data logo" class="logo" width="34" height="34" />
        <span class="brand-name">Golden Data LLC</span>
      </a>

      <nav class="navlinks" aria-label="Primary">
        <a href="{{ '/' | relative_url }}#what">What I do</a>
        <a href="{{ '/' | relative_url }}#offer">Clarity Sprint</a>
        <a href="{{ '/' | relative_url }}#proof">Proof</a>
        <span class="nav-newsletters" aria-label="Newsletters">
          <span class="nav-newsletters-label">Newsletter</span>
          <a href="{{ '/signal/' | relative_url }}">Signal</a>
          <span class="nav-newsletters-divider" aria-hidden="true">·</span>
          <a href="{{ '/crafting/' | relative_url }}">Crafting</a>
        </span>
        <a href="{{ '/' | relative_url }}#about">About</a>
        <a href="{{ '/' | relative_url }}#contact">Contact</a>
      </nav>

      <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
        <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
        </svg>
      </button>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="footer">
      <div>
        © <span id="year"></span> Golden Data ·
        <span style="opacity:.75;">Bridging your data with strategy</span>
      </div>
      <div class="navlinks">
        <a href="{{ '/' | relative_url }}#offer">Clarity Sprint</a>
        <a href="{{ '/signal/' | relative_url }}">Signal</a>
        <a href="{{ '/crafting/' | relative_url }}">Crafting</a>
        <a href="{{ '/' | relative_url }}#contact">Contact</a>
      </div>
    </footer>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    (function() {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('gd-theme', next); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
