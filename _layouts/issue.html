---
layout: default
---
<article class="card" style="padding: 48px; max-width: 760px; margin: 0 auto;">
  <p class="eyebrow">Signal — Issue #{{ page.issue_number }} · {{ page.date | date: "%B %-d, %Y" }}</p>

  <h1 style="margin-bottom: 24px;">{{ page.title }}</h1>

  {{ content }}

  <div style="margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border); font-size: 14px; color: var(--muted);">
    Working on something like this? <a href="{{ '/' | relative_url }}#contact">I'm happy to talk</a>.
  </div>

  <p style="margin-top: 40px; font-size: 14px; color: var(--muted);">
    <a href="{{ '/signal/' | relative_url }}">← All issues</a> · Drafted with Claude · Edited by Paul Brown
  </p>
</article>
